# =============================================================
# APPLICATION CONFIGURATION
# =============================================================
spring.application.name=FudgeQ-E-commerce
server.port=8080
# Ensures 'message' field in GlobalExceptionHandler is always sent to the frontend
server.error.include-message=always

# =============================================================
# DATABASE CONFIGURATION (MySQL)
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fudgeq_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=acpt

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# For clean JSON serialization with DTOs
spring.data.web.page-serialization-mode=via-dto

# =============================================================
# SECURITY & JWT CONFIGURATION
# =============================================================
# Using Environment Variables for Production (Best Practice)
# JWT Configuration (Matching your JWTTokenGenerator class)
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=3600000

# Integrity Salt for Agreement PDF Digital Signatures
fudgeq.security.integrity.salt=${FUDGEQ_SALT:FQ#Secret_2026!Agreement_Vault#Integrity^88}

# =============================================================
# FILE STORAGE & UPLOADS
# =============================================================
app.base-url=http://localhost:8080

# Local Storage Path (Root of the project)
file.upload-dir=uploads
file.base-url=${app.base-url}/uploads/

# Max file size (Set to 50MB for Agreements and Product high-res images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# =============================================================
# LOGGING & AUDITING CONFIGURATION
# =============================================================
logging.file.name=logs/fudgeq-backend.log
logging.level.root=INFO
logging.level.com.fudgeq.api=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Log Rotation: 10MB per file, kept for 7 days
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# =============================================================
# AUDITING SETTINGS (JPA)
# =============================================================
# Enabling JPA Auditing is handled via @EnableJpaAuditing in AuditConfig.java

# Spring Mail Properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
